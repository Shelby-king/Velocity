services:
  app:
    build: .
    ports:
      - "5173:5173"   # Frontend (Next.js dev server on Vite port)
      - "8080:8080"   # Linera faucet
      - "9001:9001"   # Localnet validator proxy
      - "13001:13001" # Localnet validator
    volumes:
      - .:/build
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_LINERA_RPC=http://localhost:8080
    stdin_open: true
    tty: true
